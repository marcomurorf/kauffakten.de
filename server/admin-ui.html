<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kauffakten Admin</title>
<style>
  :root { --brand:#1a73e8; --brand-d:#1557b0; --bg:#f6f8fa; --border:#e2e8f0; }
  * { box-sizing:border-box; }
  body { margin:0; font:15px/1.5 -apple-system,system-ui,sans-serif; background:var(--bg); color:#1e293b; }
  header { background:#fff; border-bottom:1px solid var(--border); padding:14px 24px; display:flex; align-items:center; gap:16px; }
  header h1 { font-size:18px; margin:0; color:var(--brand-d); }
  header .status { font-size:13px; color:#64748b; }
  main { max-width:1100px; margin:0 auto; padding:24px; }
  .cols { display:grid; grid-template-columns:1fr 1fr; gap:24px; }
  @media (max-width:900px){ .cols{grid-template-columns:1fr;} }
  section { background:#fff; border:1px solid var(--border); border-radius:10px; padding:20px; }
  h2 { font-size:16px; margin:0 0 12px; }
  button { border:0; border-radius:6px; padding:7px 14px; font-size:13px; font-weight:600; cursor:pointer; background:var(--brand); color:#fff; }
  button:hover { background:var(--brand-d); }
  button.secondary { background:#e2e8f0; color:#334155; }
  button.danger { background:#fee2e2; color:#b91c1c; }
  button:disabled { opacity:.5; cursor:default; }
  table { width:100%; border-collapse:collapse; font-size:14px; }
  th,td { text-align:left; padding:8px 10px; border-top:1px solid var(--border); }
  th { border-top:0; color:#64748b; font-size:12px; text-transform:uppercase; letter-spacing:.03em; }
  .hits { font-weight:700; color:var(--brand-d); }
  .badge { display:inline-block; font-size:11px; font-weight:600; padding:2px 8px; border-radius:999px; }
  .badge.covered { background:#dcfce7; color:#166534; }
  .badge.new { background:#dbeafe; color:#1e40af; }
  .muted { color:#94a3b8; font-size:13px; }
  .spinner { display:inline-block; width:12px; height:12px; border:2px solid #cbd5e1; border-top-color:var(--brand); border-radius:50%; animation:spin .7s linear infinite; vertical-align:-2px; }
  @keyframes spin { to { transform:rotate(360deg);} }
  dialog { border:1px solid var(--border); border-radius:12px; padding:0; width:min(760px,92vw); max-height:85vh; }
  dialog::backdrop { background:rgba(15,23,42,.45); }
  .dlg-head { display:flex; justify-content:space-between; align-items:center; padding:16px 20px; border-bottom:1px solid var(--border); }
  .dlg-body { padding:16px 20px; overflow:auto; max-height:60vh; }
  .dlg-foot { display:flex; gap:10px; justify-content:flex-end; padding:14px 20px; border-top:1px solid var(--border); }
  textarea { width:100%; min-height:340px; font:12px/1.5 ui-monospace,monospace; border:1px solid var(--border); border-radius:8px; padding:10px; }
  .warn { background:#fef9c3; color:#854d0e; padding:8px 12px; border-radius:8px; font-size:13px; margin-bottom:12px; }
  .toolbar { display:flex; gap:10px; align-items:center; margin-bottom:12px; flex-wrap:wrap; }
</style>
</head>
<body>
<header>
  <h1>Kauffakten Admin</h1>
  <span class="status" id="llm-status"></span>
  <span class="status" id="disc-status" style="margin-left:auto"></span>
</header>
<main>
  <div class="cols">
    <section>
      <h2>Vorschläge <span class="muted" id="sug-meta"></span></h2>
      <div class="toolbar">
        <button id="btn-discover">Discovery starten</button>
        <label class="muted"><input type="checkbox" id="chk-covered"> abgedeckte zeigen</label>
      </div>
      <table>
        <thead><tr><th>Hits</th><th>Begriff</th><th>Status</th><th></th></tr></thead>
        <tbody id="sug-body"><tr><td colspan="4" class="muted">Lade …</td></tr></tbody>
      </table>
    </section>

    <section>
      <h2>Entwürfe (Review nötig)</h2>
      <div class="warn">Entwürfe kommen vom LLM. Preise/ASINs vor Freigabe prüfen — leere ASIN = LLM war unsicher.</div>
      <table>
        <thead><tr><th>Kategorie</th><th>Produkte</th><th></th></tr></thead>
        <tbody id="draft-body"><tr><td colspan="3" class="muted">Lade …</td></tr></tbody>
      </table>
    </section>
  </div>
</main>

<dialog id="dlg">
  <div class="dlg-head">
    <strong id="dlg-title"></strong>
    <button class="secondary" onclick="dlg.close()">Schließen</button>
  </div>
  <div class="dlg-body">
    <textarea id="dlg-json" spellcheck="false"></textarea>
  </div>
  <div class="dlg-foot">
    <button class="danger" id="dlg-reject">Verwerfen</button>
    <button class="secondary" id="dlg-save">Speichern</button>
    <button id="dlg-approve">Freigeben → geht live</button>
  </div>
</dialog>

<script>
const $ = (id) => document.getElementById(id);
const api = async (path, opts) => {
  const res = await fetch(path, opts && {
    method: opts.method || "POST",
    headers: { "Content-Type": "application/json" },
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  if (!res.ok) throw new Error((await res.json()).error || res.status);
  return res.json();
};

let currentSlug = null;
const dlg = $("dlg");

async function refreshStatus() {
  const s = await api("/api/status");
  $("llm-status").textContent = s.llmConfigured
    ? "LLM: verbunden" : "LLM: ⚠️ Key fehlt in .env";
  const d = s.discovery;
  $("disc-status").innerHTML = d.running
    ? '<span class="spinner"></span> ' + d.progress
    : (d.progress || "");
  $("btn-discover").disabled = d.running;
  return s;
}

async function refreshSuggestions() {
  const data = await api("/api/suggestions");
  $("sug-meta").textContent = data.updatedAt
    ? "· Stand " + data.updatedAt.slice(0, 16).replace("T", " ") : "";
  const showCovered = $("chk-covered").checked;
  const items = data.items.filter(i => !i.dismissed && (showCovered || !i.covered));
  $("sug-body").innerHTML = items.length ? items.map(i => `
    <tr>
      <td class="hits">${i.hits}</td>
      <td>${i.term}</td>
      <td>${i.covered ? '<span class="badge covered">abgedeckt</span>' : '<span class="badge new">neu</span>'}</td>
      <td style="white-space:nowrap">
        ${i.covered ? "" : `<button data-gen="${i.term}">Entwurf erzeugen</button>`}
        <button class="secondary" data-dismiss="${i.term}">✕</button>
      </td>
    </tr>`).join("")
    : '<tr><td colspan="4" class="muted">Keine Vorschläge – Discovery starten.</td></tr>';
}

async function refreshDrafts() {
  const drafts = await api("/api/drafts");
  $("draft-body").innerHTML = drafts.length ? drafts.map(d => `
    <tr>
      <td><strong>${d.name}</strong><br><span class="muted">${d.slug}</span></td>
      <td>${d.products.length}${d.products.some(p => !p.asin) ? ' <span class="badge new">ASIN fehlt</span>' : ""}</td>
      <td><button data-review="${d.slug}">Review</button></td>
    </tr>`).join("")
    : '<tr><td colspan="3" class="muted">Keine offenen Entwürfe.</td></tr>';
}

async function refreshAll() {
  await Promise.all([refreshStatus(), refreshSuggestions(), refreshDrafts()]);
}

$("btn-discover").onclick = async () => {
  await api("/api/discovery/run", { body: {} });
  poll();
};

$("chk-covered").onchange = refreshSuggestions;

document.body.addEventListener("click", async (e) => {
  const t = e.target;
  if (t.dataset.gen) {
    t.disabled = true; t.innerHTML = '<span class="spinner"></span> generiere …';
    try {
      await api("/api/generate", { body: { term: t.dataset.gen } });
      await refreshAll();
    } catch (err) { alert("Fehler: " + err.message); t.disabled = false; t.textContent = "Entwurf erzeugen"; }
  }
  if (t.dataset.dismiss) {
    await api("/api/suggestions/dismiss", { body: { term: t.dataset.dismiss } });
    refreshSuggestions();
  }
  if (t.dataset.review) {
    currentSlug = t.dataset.review;
    const draft = await api("/api/drafts/" + currentSlug, { method: "GET" });
    $("dlg-title").textContent = draft.name;
    $("dlg-json").value = JSON.stringify(draft, null, 2);
    dlg.showModal();
  }
});

$("dlg-save").onclick = async () => {
  try {
    const data = JSON.parse($("dlg-json").value);
    await api("/api/drafts/" + currentSlug, { method: "PUT", body: data });
    alert("Gespeichert.");
  } catch (err) { alert("Fehler: " + err.message); }
};

$("dlg-approve").onclick = async () => {
  if (!confirm("Freigeben? Die Kategorie geht beim nächsten Build live.")) return;
  await api(`/api/drafts/${currentSlug}/approve`, { body: {} });
  dlg.close();
  refreshAll();
};

$("dlg-reject").onclick = async () => {
  if (!confirm("Entwurf endgültig verwerfen?")) return;
  await api(`/api/drafts/${currentSlug}/reject`, { body: {} });
  dlg.close();
  refreshAll();
};

let pollTimer = null;
async function poll() {
  const s = await refreshStatus();
  if (s.discovery.running) {
    pollTimer = setTimeout(poll, 2000);
  } else {
    clearTimeout(pollTimer);
    refreshSuggestions();
  }
}

refreshAll();
</script>
</body>
</html>
