<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BookAndBuy Admin – Inhalte</title>
<link rel="stylesheet" href="./admin-ui.css">
</head>
<body>
<header>
  <h1>BookAndBuy Admin</h1>
  <span id="nav"></span>
  <span class="status" id="llm-status"></span>
  <span class="status" id="disc-status" style="margin-left:auto"></span>
  <span class="status" id="pub-status"></span>
  <button id="btn-publish">Site neu bauen</button>
</header>
<main>
  <div class="cols">
    <section>
      <h2>Vorschläge <span class="muted" id="sug-meta"></span></h2>
      <div class="toolbar">
        <button id="btn-discover">Discovery starten</button>
        <label class="muted"><input type="checkbox" id="chk-covered"> abgedeckte zeigen</label>
      </div>
      <div class="scroll-x">
      <table>
        <thead><tr><th>Hits</th><th>Begriff</th><th>Status</th><th></th></tr></thead>
        <tbody id="sug-body"><tr><td colspan="4" class="muted">Lade …</td></tr></tbody>
      </table>
      </div>
    </section>

    <section>
      <h2>Entwürfe (Review nötig)</h2>
      <div class="warn">Entwürfe kommen vom LLM. Preise/ASINs vor Freigabe prüfen — leere ASIN = LLM war unsicher.</div>
      <div class="scroll-x">
      <table>
        <thead><tr><th>Kategorie</th><th>Produkte</th><th></th></tr></thead>
        <tbody id="draft-body"><tr><td colspan="3" class="muted">Lade …</td></tr></tbody>
      </table>
      </div>
    </section>
  </div>
</main>

<dialog id="dlg">
  <div class="dlg-head">
    <strong id="dlg-title"></strong>
    <button class="secondary" onclick="dlg.close()">Schließen</button>
  </div>
  <div class="dlg-body">
    <div class="tabs">
      <button id="tab-preview" class="active">Vorschau</button>
      <button id="tab-json">JSON bearbeiten</button>
    </div>
    <div id="dlg-preview">
      <p class="muted" id="prev-fazit"></p>
      <div class="pcards" id="prev-cards"></div>
    </div>
    <textarea id="dlg-json" spellcheck="false" style="display:none"></textarea>
  </div>
  <div class="dlg-foot">
    <button class="danger" id="dlg-reject">Verwerfen</button>
    <button class="secondary" id="dlg-verify">ASINs prüfen</button>
    <button class="secondary" id="dlg-save">Speichern</button>
    <button id="dlg-approve">Freigeben → geht live</button>
  </div>
</dialog>

<script src="./admin-shared.js"></script>
<script>
$("nav").outerHTML = renderNav("dashboard");

let currentSlug = null;
const dlg = $("dlg");

const asinBadge = (p) => {
  if (!p.asinStatus) return "";
  const cls = p.asinStatus === "ok" || p.asinStatus === "korrigiert" ? "covered" : "new";
  return ` <span class="badge ${cls}" title="geprüft ${esc(p.asinCheckedAt || "")}">ASIN ${esc(p.asinStatus)}</span>`;
};

function renderPreview() {
  let d;
  try { d = JSON.parse($("dlg-json").value); }
  catch { $("prev-cards").innerHTML = '<p class="muted">JSON ungültig – im JSON-Tab korrigieren.</p>'; return; }
  $("prev-fazit").textContent = d.fazit || d.intro || "";
  $("prev-cards").innerHTML = (d.products || []).map((p) => `
    <div class="pcard">
      <div class="imgbox">${prodImg(p)
        ? `<img src="${esc(prodImg(p))}" alt="" loading="lazy" onerror="this.parentNode.innerHTML='<span class=noimg>kein Bild (ASIN prüfen)</span>'">`
        : '<span class="noimg">keine ASIN</span>'}</div>
      <div class="pname">${esc(p.name)}</div>
      <div class="pmeta">${esc(p.brand || "")} · <span class="pprice">${p.price?.value ?? "?"} €</span>
        ${p.asin ? `· <a href="https://www.amazon.de/dp/${esc(p.asin)}?tag=${AMAZON_TAG}" target="_blank" rel="noopener">${esc(p.asin)}</a>` : '· <span class="badge new">ASIN fehlt</span>'}${asinBadge(p)}</div>
      ${p.pros?.length ? `<ul class="plist">${p.pros.slice(0, 2).map((x) => `<li>${esc(x)}</li>`).join("")}</ul>` : ""}
      ${p.cons?.length ? `<ul class="plist cons">${p.cons.slice(0, 1).map((x) => `<li>${esc(x)}</li>`).join("")}</ul>` : ""}
    </div>`).join("") || '<p class="muted">Keine Produkte im Entwurf.</p>';
}

function showTab(which) {
  const isPrev = which === "preview";
  $("tab-preview").classList.toggle("active", isPrev);
  $("tab-json").classList.toggle("active", !isPrev);
  $("dlg-preview").style.display = isPrev ? "" : "none";
  $("dlg-json").style.display = isPrev ? "none" : "";
  if (isPrev) renderPreview();
}
$("tab-preview").onclick = () => showTab("preview");
$("tab-json").onclick = () => showTab("json");

async function refreshStatus() {
  const s = await refreshPublishStatus();
  if (!s) return null;
  $("llm-status").textContent = s.llmConfigured
    ? "LLM: verbunden" : "LLM: ⚠️ Key fehlt in .env";
  const d = s.discovery;
  $("disc-status").innerHTML = d.running
    ? '<span class="spinner"></span> ' + esc(d.progress)
    : esc(d.progress || "");
  $("btn-discover").disabled = d.running;
  return s;
}

async function refreshSuggestions() {
  const data = await api("/api/suggestions", { method: "GET" });
  $("sug-meta").textContent = data.updatedAt
    ? "· Stand " + data.updatedAt.slice(0, 16).replace("T", " ") : "";
  const showCovered = $("chk-covered").checked;
  const items = data.items.filter(i => !i.dismissed && (showCovered || !i.covered));
  $("sug-body").innerHTML = items.length ? items.map(i => `
    <tr>
      <td class="hits">${i.hits}</td>
      <td>${esc(i.term)}</td>
      <td>${i.covered ? '<span class="badge covered">abgedeckt</span>' : '<span class="badge new">neu</span>'}</td>
      <td style="white-space:nowrap">
        ${i.covered ? "" : `<button data-gen="${esc(i.term)}">Entwurf erzeugen</button>`}
        <button class="secondary" data-dismiss="${esc(i.term)}">✕</button>
      </td>
    </tr>`).join("")
    : '<tr><td colspan="4" class="muted">Keine Vorschläge – Discovery starten.</td></tr>';
}

async function refreshDrafts() {
  const drafts = await api("/api/drafts", { method: "GET" });
  $("draft-body").innerHTML = drafts.length ? drafts.map(d => `
    <tr>
      <td><strong>${esc(d.name)}</strong><br><span class="muted">${esc(d.slug)}</span></td>
      <td>${d.products.length}${d.products.some(p => !p.asin) ? ' <span class="badge new">ASIN fehlt</span>' : ""}</td>
      <td><button data-review="${esc(d.slug)}">Review</button></td>
    </tr>`).join("")
    : '<tr><td colspan="3" class="muted">Keine offenen Entwürfe.</td></tr>';
}

async function refreshAll() {
  await Promise.all([refreshStatus(), refreshSuggestions(), refreshDrafts()]);
}

$("btn-discover").onclick = async () => {
  await api("/api/discovery/run", { body: {} });
  poll();
};
wirePublishButton(refreshAll);
$("chk-covered").onchange = refreshSuggestions;

document.body.addEventListener("click", async (e) => {
  const t = e.target;
  if (t.dataset.gen) {
    t.disabled = true; t.innerHTML = '<span class="spinner"></span> generiere …';
    try {
      await api("/api/generate", { body: { term: t.dataset.gen } });
      await refreshAll();
    } catch (err) { alert("Fehler: " + err.message); t.disabled = false; t.textContent = "Entwurf erzeugen"; }
  }
  if (t.dataset.dismiss) {
    await api("/api/suggestions/dismiss", { body: { term: t.dataset.dismiss } });
    refreshSuggestions();
  }
  if (t.dataset.review) {
    currentSlug = t.dataset.review;
    const draft = await api("/api/drafts/" + currentSlug, { method: "GET" });
    $("dlg-title").textContent = draft.name;
    $("dlg-json").value = JSON.stringify(draft, null, 2);
    showTab("preview");
    dlg.showModal();
  }
});

$("dlg-save").onclick = async () => {
  try {
    const data = JSON.parse($("dlg-json").value);
    await api("/api/drafts/" + currentSlug, { method: "PUT", body: data });
    alert("Gespeichert.");
  } catch (err) { alert("Fehler: " + err.message); }
};

$("dlg-verify").onclick = async () => {
  const btn = $("dlg-verify");
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> prüfe …';
  try {
    const data = JSON.parse($("dlg-json").value);
    await api("/api/drafts/" + currentSlug, { method: "PUT", body: data });
    const r = await api(`/api/drafts/${currentSlug}/verify`, { body: {} });
    const draft = await api("/api/drafts/" + currentSlug, { method: "GET" });
    $("dlg-json").value = JSON.stringify(draft, null, 2);
    renderPreview();
    alert("ASIN-Prüfung:\n" + r.report.map((e) =>
      `• ${e.name}: ${e.status}${e.fixedFrom ? ` (${e.fixedFrom || "leer"} → ${e.asin})` : ""}`).join("\n"));
  } catch (err) { alert("Fehler: " + err.message); }
  btn.disabled = false; btn.textContent = "ASINs prüfen";
};

$("dlg-approve").onclick = async () => {
  if (!confirm("Freigeben? Die Kategorie geht sofort live (automatischer Build).")) return;
  await api(`/api/drafts/${currentSlug}/approve`, { body: {} });
  dlg.close();
  poll();
  refreshAll();
};

$("dlg-reject").onclick = async () => {
  if (!confirm("Entwurf endgültig verwerfen?")) return;
  await api(`/api/drafts/${currentSlug}/reject`, { body: {} });
  dlg.close();
  refreshAll();
};

let pollTimer = null;
async function poll() {
  const s = await refreshStatus();
  if (s && (s.discovery.running || s.publish.running)) {
    pollTimer = setTimeout(poll, 2000);
  } else {
    clearTimeout(pollTimer);
    refreshSuggestions();
  }
}

refreshAll();
</script>
</body>
</html>
